services:
  mcp-server:
    container_name: mcp-server
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "mcp-server"]
    expose:
      - "8000"

  gateway:
    container_name: mcp-gateway
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - path: ../.env
        required: false
    environment:
      GATEWAY_UPSTREAM_URL: http://mcp-server:8000/mcp
    ports:
      - "8080:8080"
    volumes:
      - ../src:/app/src:ro
    depends_on:
      - mcp-server
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  mcp-client:
    container_name: mcp-client
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "mcp-client", "--url", "http://gateway:8080/mcp"]
    depends_on:
      gateway:
        condition: service_healthy
      mcp-server:
        condition: service_started
