services:
  mcp-server:
    container_name: mcp-server
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "mcp-server"]
    expose:
      - "8000"

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    env_file:
      - path: ../.env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway}
      POSTGRES_DB: ${POSTGRES_DB:-audit}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 2s
      timeout: 3s
      retries: 15

  gateway:
    container_name: mcp-gateway
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - path: ../.env
        required: false
    environment:
      GATEWAY_UPSTREAM_URL: http://mcp-server:8000/mcp
      GATEWAY_AUDIT_DB_PATH: postgresql://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD:-gateway}@postgres:5432/${POSTGRES_DB:-audit}
    ports:
      - "8080:8080"
    volumes:
      - ../src:/app/src:ro
      - ../policy.yaml:/app/policy.yaml:ro
    depends_on:
      mcp-server:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  mcp-client:
    container_name: mcp-client
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - path: ../.env
        required: false
    command: ["uv", "run", "mcp-client", "--url", "http://gateway:8080/mcp"]
    depends_on:
      gateway:
        condition: service_healthy
      mcp-server:
        condition: service_started

volumes:
  postgres-data:
