services:
  mcp-server:
    container_name: mcp-server
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["uv", "run", "mcp-server"]
    expose:
      - "8000"

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    env_file:
      - path: ../.env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway}
      POSTGRES_DB: ${POSTGRES_DB:-audit}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    container_name: redis
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:latest
    environment:
      QUERY_UI_CONFIG: /etc/jaeger/ui-config.json
    volumes:
      - ./jaeger-ui-config.json:/etc/jaeger/ui-config.json:ro
    ports:
      - "16686:16686"
      - "4318:4318"

  gateway:
    container_name: mcp-gateway
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - path: ../.env
        required: false
    environment:
      GATEWAY_UPSTREAM_URL: http://mcp-server:8000/mcp
      GATEWAY_AUDIT_DB_PATH: postgresql://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD:-gateway}@postgres:5432/${POSTGRES_DB:-audit}
      GATEWAY_OTEL_EXPORTER_ENDPOINT: http://jaeger:4318/v1/traces
      GATEWAY_REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    volumes:
      - ../src:/app/src:ro
      - ../policy.yaml:/app/policy.yaml:ro
    depends_on:
      mcp-server:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  mcp-client:
    container_name: mcp-client
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - path: ../.env
        required: false
    command: ["uv", "run", "mcp-client", "--url", "http://gateway:8080/mcp"]
    depends_on:
      gateway:
        condition: service_healthy
      mcp-server:
        condition: service_started

volumes:
  postgres-data:
