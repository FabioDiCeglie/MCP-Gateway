name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run ruff
        run: |
          uv sync --group dev
          uv run ruff check .
          uv run ruff format --check .

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run unit tests
        run: |
          uv sync --group dev
          uv run pytest

  e2e-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Run docker e2e smoke test
        run: ./tests/e2e-docker.sh

      - name: Cleanup Docker stack
        if: always()
        working-directory: docker
        run: docker compose down -v --remove-orphans
